services:
  pihole:
    image: pihole/pihole:latest
    container_name: pihole
    environment:
      TZ: America/New_York
      FTLCONF_webserver_api_password: 'REPLACE_WITH_YOUR_PASSWORD'
      FTLCONF_dns_upstreams: 127.0.0.1#5053
      FTLCONF_dns_listeningMode: all
      FTLCONF_dns_hosts: |-
        192.168.68.2 omv.time-puffin.ts.net
        192.168.68.2 flame.time-puffin.ts.net
        192.168.68.2 jellyfin.time-puffin.ts.net
        192.168.68.2 jellyseerr.time-puffin.ts.net
        192.168.68.2 brave.time-puffin.ts.net
        192.168.68.2 audiobookshelf.time-puffin.ts.net
      PIHOLE_UID: "1000"
      PIHOLE_GID: "1000"
    ports:
      - 192.168.68.2:53:53/tcp
      - 192.168.68.2:53:53/udp
      - 8088:80/tcp
    volumes:
      - ./etc-pihole:/etc/pihole
      - ./etc-dnsmasq.d:/etc/dnsmasq.d
    restart: unless-stopped

  dnsproxy:
    image: adguard/dnsproxy:latest
    container_name: dnsproxy-nextdns
    network_mode: "service:pihole"
    command:
      - "--listen=127.0.0.1"
      - "--port=5053"
      - "--bootstrap=1.1.1.1:53"
      - "--bootstrap=9.9.9.9:53"
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: nginx-pihole
    depends_on:
      - pihole
    ports:
      - 8089:8089
      - 443:443
    volumes:
      - ./conf.d:/etc/nginx/conf.d:ro
      - /docker/tailscale-certs:/etc/nginx/omv-certs:ro
      - /docker/flame/ts/state/certs:/etc/nginx/flame-certs:ro
      - /docker/jellyfin/ts/state/certs:/etc/nginx/jellyfin-certs:ro
      - /docker/jellyseerr/ts/state/certs:/etc/nginx/jellyseerr-certs:ro
      - /docker/brave/ts/state/certs:/etc/nginx/brave-certs:ro
      - /docker/audiobookshelf/ts/state/certs:/etc/nginx/audiobookshelf-certs:ro
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /var/cache/nginx
      - /var/run
      - /var/tmp

networks: {}