server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name flame.time-puffin.ts.net;

    ssl_certificate     /etc/nginx/flame-certs/flame.time-puffin.ts.net.crt;
    ssl_certificate_key /etc/nginx/flame-certs/flame.time-puffin.ts.net.key;
    ssl_protocols       TLSv1.2 TLSv1.3;

    location / {
        proxy_pass https://100.80.247.113:443;
        proxy_http_version 1.1;

        proxy_set_header Host              flame.time-puffin.ts.net;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Host  $host;

        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        "upgrade";

        proxy_ssl_server_name on;
        proxy_ssl_name flame.time-puffin.ts.net;
        proxy_ssl_verify off;

        proxy_buffering off;
    }
}