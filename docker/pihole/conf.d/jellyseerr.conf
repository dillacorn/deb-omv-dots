server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name jellyseerr.time-puffin.ts.net;

    ssl_certificate     /etc/nginx/jellyseerr-certs/jellyseerr.time-puffin.ts.net.crt;
    ssl_certificate_key /etc/nginx/jellyseerr-certs/jellyseerr.time-puffin.ts.net.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_session_timeout 1d;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_tickets off;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    client_max_body_size 0;
    proxy_read_timeout 3600;
    proxy_send_timeout 3600;
    send_timeout 3600;

    location / {
        proxy_pass https://100.114.255.78:443;
        proxy_http_version 1.1;

        proxy_set_header Host              jellyseerr.time-puffin.ts.net;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Host  $host;

        proxy_ssl_server_name on;
        proxy_ssl_name jellyseerr.time-puffin.ts.net;
        proxy_ssl_verify off;

        proxy_buffering off;
    }
}